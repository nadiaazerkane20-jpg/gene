// Convert a EUR sell price to target currency using fixed map or rate
function convertSellPrice(eurSellPrice, targetCurrency) {
  if (targetCurrency === "EUR") return eurSellPrice;
  const fixedMap = SELL_PRICE_CONVERT[targetCurrency];
  if (fixedMap && fixedMap[eurSellPrice]) return fixedMap[eurSellPrice];
  // Fallback: use exchange rate and round nicely
  const rate = EUR_RATES[targetCurrency] || 1;
  const converted = parseFloat(eurSellPrice) * rate;
  if (converted >= 100) return String(Math.round(converted));
  return converted.toFixed(2);
}

// Convert an original EUR price to target currency
function convertOriginalPrice(eurPrice, targetCurrency) {
  if (targetCurrency === "EUR") return eurPrice;
  const rate = EUR_RATES[targetCurrency] || 1;
  const converted = eurPrice * rate;
  if (converted >= 100) return Math.round(converted);
  return Math.round(converted * 100) / 100;
}

function getSellPrice(originalPrice, rules) {
  const p = parseFloat(originalPrice);
  const r = rules || PRICE_RULES;
  for (const rule of r) {
    if (p >= rule.threshold) return rule.sell;
  }
  return "6.99";
}

function getClosestAffLink(sellPrice) {
  const keys = Object.keys(AFFILIATE_LINKS).map(Number);
  const sp = parseFloat(sellPrice);
  let closest = keys[0];
  for (const k of keys) {
    if (Math.abs(k - sp) < Math.abs(closest - sp)) closest = k;
  }
  return AFFILIATE_LINKS[String(closest.toFixed(2))] || AFFILIATE_LINKS["9.99"];
}

function buildAffLink(sellPrice, pixelFB, pixelGoogle, productName, productImage) {
  const base = getClosestAffLink(sellPrice);
  const pixel = pixelFB || pixelGoogle || "";
  const name = (productName || "").replace(/\s+/g, "_");
  const img = (productImage || "").replace(/\s+/g, "_");
  const source = `${name}___${img}`;
  return `${base}&aff_sub5=${encodeURIComponent(pixel)}&source=${encodeURIComponent(source)}`;
}

                                <div style={{ fontSize:9,color:"rgba(255,255,255,0.3)",maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }} title={v.name}>{v.name}</div>
                                <div style={{ fontSize:10,color:"rgba(0,255,136,0.5)",fontWeight:700,whiteSpace:"nowrap" }}>{v.sellPrice}{curSymbol}</div>
                                <button onClick={() => {
                                  setConfig(c => {
                                    const groups = [...c.productGroups];
                                    const variants = groups[gi].variants.filter((_, idx) => idx !== vi);
                                    if (variants.length < 2) {
                                      return { ...c, productGroups: c.productGroups.filter(gr => gr.id !== g.id) };
                                    }
                                    groups[gi] = { ...groups[gi], variants };
                                    return { ...c, productGroups: groups };
                                  });
                                }} style={{ background:"rgba(255,68,68,0.06)",border:"1px solid rgba(255,68,68,0.12)",borderRadius:4,color:"#FF6666",cursor:"pointer",padding:"2px 6px",fontSize:9,fontFamily:"'DM Sans',sans-serif",flexShrink:0 }}>✕</button>
                              </div>
                            ))}
                          </div>
                          <div style={{ fontSize:9,color:"rgba(139,92,246,0.35)",marginTop:6 }}>
                            {g.variants.length} variante{g.variants.length > 1 ? "s" : ""} — Modifie les noms, supprime une variante (min 2 pour garder le groupe)
                          </div>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Group creation — smart search */}
                  <div style={{ padding:"14px",background:"rgba(139,92,246,0.03)",border:"1px solid rgba(139,92,246,0.1)",borderRadius:8 }}>
                    
                    {/* Step 1: Type group name → auto-finds matching products */}
                    <div style={{ marginBottom:12 }}>
                      <div style={{ fontSize:11,color:"rgba(139,92,246,0.6)",fontWeight:600,marginBottom:6 }}>1. Tape le nom du groupe — les produits correspondants se sélectionnent automatiquement</div>
                      <div style={{ display:"flex",gap:8 }}>
                        <input
                          value={groupName}
                          onChange={e => {
                            const val = e.target.value;
                            setGroupName(val);
                            // Auto-select all ungrouped products matching this name
                            if (val.trim().length >= 2) {
                              const matching = ungroupedProducts.filter(p => p.name.toLowerCase().includes(val.trim().toLowerCase())).map(p => p._idx);
                              setSelectedForGroup(matching);
                            } else {
                              setSelectedForGroup([]);
                            }
                          }}
                          placeholder="Tape un nom (ex: JOGGING ALO) → sélection auto"
                          style={{ ...inputStyle,flex:1,background:"rgba(139,92,246,0.06)",border:"1px solid rgba(139,92,246,0.15)",fontSize:13 }}
                        />
                        <button
                          onClick={createGroup}
                          disabled={!groupName.trim() || selectedForGroup.length < 2}
                          style={{ ...btnSec,padding:"8px 16px",fontSize:11,whiteSpace:"nowrap",
                            background: groupName.trim() && selectedForGroup.length >= 2 ? "linear-gradient(135deg,#8B5CF6,#A78BFA)" : "rgba(139,92,246,0.08)",
                            color: groupName.trim() && selectedForGroup.length >= 2 ? "#fff" : "rgba(139,92,246,0.4)",
                            border: "1px solid rgba(139,92,246,0.2)",
                            boxShadow: groupName.trim() && selectedForGroup.length >= 2 ? "0 4px 15px rgba(139,92,246,0.25)" : "none",
                          }}
                        >
                          🔗 Créer ({selectedForGroup.length})
                        </button>
                      </div>
                    </div>

                    {/* Auto-matched products preview */}
                    {selectedForGroup.length > 0 && (
                      <div style={{ padding:"10px 12px",background:"rgba(139,92,246,0.06)",border:"1px solid rgba(139,92,246,0.15)",borderRadius:8,marginBottom:12 }}>
                        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8 }}>
                          <span style={{ fontSize:11,color:"#A78BFA",fontWeight:600 }}>✓ {selectedForGroup.length} produits trouvés pour "{groupName}"</span>
                          <button onClick={() => setSelectedForGroup([])} style={{ background:"none",border:"none",color:"rgba(139,92,246,0.4)",cursor:"pointer",fontSize:10,fontFamily:"'DM Sans',sans-serif" }}>Réinitialiser</button>
                        </div>
                        <div style={{ display:"flex",flexWrap:"wrap",gap:4 }}>
                          {selectedForGroup.slice(0,20).map(idx => {
                            const p = config.products[idx];
                            if (!p) return null;
                            const base = groupName.trim().toLowerCase();
                            let label = p.name.toLowerCase().replace(base,"").trim();
                            label = label ? label.charAt(0).toUpperCase() + label.slice(1) : p.name;
                            return (
                              <div key={idx} style={{ display:"flex",alignItems:"center",gap:4,padding:"3px 8px",background:"rgba(139,92,246,0.1)",border:"1px solid rgba(139,92,246,0.2)",borderRadius:16,fontSize:10,color:"#C4B5FD" }}>
                                <span style={{ width:6,height:6,borderRadius:"50%",background:"#A78BFA" }}></span>
                                {label}
                                <span onClick={(e) => { e.stopPropagation(); setSelectedForGroup(prev => prev.filter(i => i !== idx)); }}
                                  style={{ cursor:"pointer",color:"rgba(255,100,100,0.6)",marginLeft:2,fontSize:12 }}>×</span>
                              </div>
                            );
                          })}
                          {selectedForGroup.length > 20 && <span style={{ fontSize:10,color:"rgba(139,92,246,0.4)" }}>+{selectedForGroup.length-20} autres</span>}
                        </div>
                      </div>
                    )}

                    {/* Manual search + select for fine-tuning */}
                    <div style={{ fontSize:11,color:"rgba(139,92,246,0.5)",fontWeight:600,marginBottom:6 }}>2. Ou cherche et sélectionne manuellement</div>
                    <input
                      value={groupSearch}
                      onChange={e => setGroupSearch(e.target.value)}
                      placeholder="🔍 Filtrer les produits..."
                      style={{ ...inputStyle,marginBottom:8,padding:"7px 12px",fontSize:12,background:"rgba(139,92,246,0.04)",border:"1px solid rgba(139,92,246,0.1)" }}
                    />

                    {/* Quick select by search */}
                    {groupSearch.trim().length >= 2 && (
                      <button onClick={() => {
                        const matching = filteredUngrouped.map(p => p._idx);
                        const allSel = matching.every(i => selectedForGroup.includes(i));
                        if (allSel) {
                          setSelectedForGroup(prev => prev.filter(i => !matching.includes(i)));
                        } else {
                          setSelectedForGroup(prev => [...new Set([...prev, ...matching])]);
                        }
                      }} style={{ ...btnSec,padding:"4px 12px",fontSize:10,marginBottom:8,color:"#A78BFA",borderColor:"rgba(139,92,246,0.2)",background:"rgba(139,92,246,0.08)" }}>
                        ☑ Sélectionner tous les "{groupSearch}" ({filteredUngrouped.length})
                      </button>
                    )}

                    {/* Selectable products */}
                    <div style={{ maxHeight:250,overflowY:"auto" }}>
                      {filteredUngrouped.slice(0,80).map(p => {
                        const sel = selectedForGroup.includes(p._idx);
                        return (
                          <div key={p._idx} onClick={() => toggleProductSelect(p._idx)} style={{
                            display:"flex",alignItems:"center",gap:10,padding:"8px 10px",cursor:"pointer",
                            background: sel ? "rgba(139,92,246,0.12)" : "transparent",
                            border: `1px solid ${sel ? "rgba(139,92,246,0.3)" : "transparent"}`,
                            borderRadius:6,marginBottom:2,transition:"all 0.15s",
                          }}>
                            <div style={{
                              width:20,height:20,borderRadius:5,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                              background: sel ? "#8B5CF6" : "rgba(139,92,246,0.08)",
                              border: `1.5px solid ${sel ? "#8B5CF6" : "rgba(139,92,246,0.2)"}`,
                              fontSize:11,color:"#fff",fontWeight:700,
                            }}>
                              {sel && "✓"}
                            </div>
                            <div style={{ flex:1,minWidth:0 }}>
                              <div style={{ fontSize:12,fontWeight:sel?600:400,color:sel?"#C4B5FD":"rgba(255,255,255,0.6)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{p.name}</div>
                            </div>
                            <div style={{ fontSize:10,color:"rgba(0,255,136,0.5)" }}>{p.sellPrice}{curSymbol}</div>
                          </div>
                        );
                      })}
                      {filteredUngrouped.length === 0 && (
                        <div style={{ textAlign:"center",padding:16,fontSize:12,color:"rgba(139,92,246,0.4)" }}>
                          {groupSearch ? "Aucun produit trouvé" : "Tous les produits sont déjà groupés"}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ─── PIXELS ─── */}
          {activeTab==="pixels" && (
            <div style={{ animation:"fadeIn 0.3s ease" }}>
              <h2 style={{ fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:"0.04em",marginBottom:2 }}>Pixels & Tracking</h2>
              <p style={{ color:"rgba(255,255,255,0.35)",fontSize:12,marginBottom:24 }}>Configure tes pixels</p>
              <div style={cardStyle}>
                <label style={labelStyle}>📘 Facebook Pixel ID</label>
                <input value={config.pixelFB} onChange={e=>update("pixelFB",e.target.value)} placeholder="123456789012345" style={inputStyle}/>
                <div style={{ fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:4 }}>Injecté dans le head + ajouté aux liens aff (aff_sub5)</div>
              </div>
              <div style={cardStyle}>
                <label style={labelStyle}>🔴 Google Pixel / GTM</label>
                <input value={config.pixelGoogle} onChange={e=>update("pixelGoogle",e.target.value)} placeholder="G-XXXXXXXXXX" style={inputStyle}/>
              </div>
              <button onClick={recalcProducts} style={{ ...btnSec,marginTop:6,fontSize:12 }}>🔄 Recalculer liens affiliation</button>
              <div style={{ ...cardStyle,marginTop:16 }}>
                <label style={labelStyle}>🔗 Liens d'affiliation</label>
                <div style={{ display:"grid",gap:4 }}>
                  {Object.entries(AFFILIATE_LINKS).map(([price,link])=>(
                    <div key={price} style={{ display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:"rgba(255,255,255,0.02)",borderRadius:5,fontSize:11 }}>
                      <span style={{ fontWeight:700,color:"#00C48C",minWidth:50 }}>{price}€</span>
                      <span style={{ color:"rgba(255,255,255,0.3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1 }}>{link}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ─── LEGAL ─── */}
          {activeTab==="legal" && (
            <div style={{ animation:"fadeIn 0.3s ease" }}>
              <h2 style={{ fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:"0.04em",marginBottom:2 }}>Informations Légales</h2>
              <p style={{ color:"rgba(255,255,255,0.35)",fontSize:12,marginBottom:24 }}>Infos affichées dans le footer</p>
              <button onClick={()=>{const t=LEGAL_TEMPLATES[config.market];if(t)setConfig(c=>({...c,legalCompany:t.company,legalReg:t.reg,legalVat:t.vat,legalAddress:t.address}))}} style={{ ...btnSec,marginBottom:16 }}>
                🎲 Générer aléatoire pour {config.market}
              </button>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:14 }}>
                <div style={cardStyle}><label style={labelStyle}>🏢 Société</label><input value={config.legalCompany} onChange={e=>update("legalCompany",e.target.value)} style={inputStyle}/></div>
                <div style={cardStyle}><label style={labelStyle}>📋 N° enregistrement</label><input value={config.legalReg} onChange={e=>update("legalReg",e.target.value)} style={inputStyle}/></div>
                <div style={cardStyle}><label style={labelStyle}>💶 TVA</label><input value={config.legalVat} onChange={e=>update("legalVat",e.target.value)} style={inputStyle}/></div>
                <div style={cardStyle}><label style={labelStyle}>📍 Adresse</label><input value={config.legalAddress} onChange={e=>update("legalAddress",e.target.value)} style={inputStyle}/></div>
              </div>
            </div>
          )}

          {/* ─── AI DIRECTION ─── */}
          {activeTab==="ai" && (
            <div style={{ animation:"fadeIn 0.3s ease" }}>
              <h2 style={{ fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:"0.04em",marginBottom:2 }}>Direction Artistique</h2>
              <p style={{ color:"rgba(255,255,255,0.35)",fontSize:12,marginBottom:24 }}>Tes instructions libres pour la génération</p>
              <div style={cardStyle}>
                <label style={labelStyle}>🤖 Instructions</label>
                <textarea value={config.aiDirection} onChange={e=>update("aiDirection",e.target.value)}
                  placeholder={`Décris ce que tu veux...\n\n• "Design luxueux, hero plein écran avec vidéo"\n• "Style minimaliste japonais, beaucoup de blanc"\n• "Ambiance street/urban, néon, glitch"\n• "Bandeau LIVRAISON GRATUITE en haut"\n• "Countdown timer sur le hero"\n• "Badges de confiance très visibles"`}
                  style={{ ...inputStyle,minHeight:220,resize:"vertical",lineHeight:1.6 }}/>
              </div>
            </div>
          )}

          {/* ─── GENERATE ─── */}
          {activeTab==="generate" && (
            <div style={{ animation:"fadeIn 0.3s ease" }}>
              <h2 style={{ fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:"0.04em",marginBottom:2 }}>
                {generatedHTML ? "🎉 Site Généré !" : "Génération du site"}
              </h2>
              <p style={{ color:"rgba(255,255,255,0.35)",fontSize:12,marginBottom:24 }}>
                {generatedHTML ? "Ton site est prêt ! Prévisualise et télécharge." : "Claude AI va générer ton site complet"}
              </p>

              {/* Error */}
              {genError && (
                <div style={{ ...cardStyle,borderColor:"rgba(255,60,60,0.3)",background:"rgba(255,60,60,0.06)" }}>
                  <div style={{ fontSize:14,fontWeight:600,color:"#FF4444",marginBottom:6 }}>❌ Erreur</div>
                  <div style={{ fontSize:12,color:"rgba(255,255,255,0.5)" }}>{genError}</div>
                  <button onClick={handleGenerate} style={{ ...btnPrimary,marginTop:12,fontSize:12 }}>🔄 Réessayer</button>
                </div>
              )}

              {/* Success - Prompt Generated */}
              {generatedHTML && (
                <>
                  {/* Status */}
                  {genProgress && (
                    <div style={{ ...cardStyle, borderColor:"rgba(0,182,122,0.3)", background:"rgba(0,182,122,0.05)", textAlign:"center", padding:16, marginBottom:14 }}>
                      <div style={{ fontSize:14, fontWeight:600, color:"#00C48C" }}>{genProgress}</div>
                    </div>
                  )}

                  {/* Actions */}
                  <div style={{ display:"flex",gap:10,marginBottom:16,flexWrap:"wrap" }}>
                    <button onClick={() => { navigator.clipboard.writeText(generatedHTML).catch(()=>{}); setGenProgress("✅ Copié !"); }} style={btnPrimary}>
                      📋 Copier le prompt
                    </button>
                    <button onClick={handleGenerate} style={btnSec}>🔄 Regénérer</button>
                  </div>

                  {/* Config summary */}
                  <div style={{ ...cardStyle, borderColor:"rgba(255,107,53,0.2)", background:"rgba(255,107,53,0.03)" }}>
                    <label style={{ ...labelStyle, color:accent }}>📊 Résumé</label>
                    <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,fontSize:11 }}>
                      {[
                        { l:"Langue", v:LANGUAGES.find(l=>l.code===config.language)?.label },
                        { l:"Marché", v:MARKETS.find(m=>m.code===config.market)?.label },
                        { l:"Devise", v:CURRENCIES.find(c=>c.code===config.currency)?.label },
                        { l:"Boutique", v:config.shopName||"—" },
                        { l:"Niche", v:config.niche||"—" },
                        { l:"Sections", v:`${config.sections.length} sélectionnées` },
                        { l:"Produits", v:`${config.products.length} importés` },
                        { l:"Pixel FB", v:config.pixelFB||"—" },
                        { l:"Police", v:config.font },
                      ].map((item,i)=>(
                        <div key={i} style={{ padding:"5px 8px",background:"rgba(255,255,255,0.03)",borderRadius:5 }}>
                          <div style={{ color:"rgba(255,255,255,0.35)",fontSize:9,marginBottom:1 }}>{item.l}</div>
                          <div style={{ fontWeight:600,color:"rgba(255,255,255,0.75)" }}>{item.v}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Instructions */}
                  <div style={{ ...cardStyle, borderColor:"rgba(139,92,246,0.25)", background:"rgba(139,92,246,0.03)" }}>
                    <div style={{ fontSize:13,fontWeight:600,color:"#A78BFA",marginBottom:10 }}>🚀 Comment utiliser ce prompt :</div>
                    <div style={{ display:"grid",gap:8,fontSize:12,color:"rgba(255,255,255,0.55)" }}>
                      <div style={{ display:"flex",gap:8,alignItems:"flex-start" }}>
                        <span style={{ background:"rgba(139,92,246,0.2)",color:"#A78BFA",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700,flexShrink:0 }}>1</span>
                        <span>Ouvre <strong style={{color:"#C4B5FD"}}>claude.ai</strong> dans un nouvel onglet</span>
                      </div>
                      <div style={{ display:"flex",gap:8,alignItems:"flex-start" }}>
                        <span style={{ background:"rgba(139,92,246,0.2)",color:"#A78BFA",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700,flexShrink:0 }}>2</span>
                        <span>Colle le prompt (déjà copié dans ton presse-papier)</span>
                      </div>
                      <div style={{ display:"flex",gap:8,alignItems:"flex-start" }}>
                        <span style={{ background:"rgba(139,92,246,0.2)",color:"#A78BFA",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700,flexShrink:0 }}>3</span>
                        <span>Claude te génère le site HTML complet</span>
                      </div>
                      <div style={{ display:"flex",gap:8,alignItems:"flex-start" }}>
                        <span style={{ background:"rgba(139,92,246,0.2)",color:"#A78BFA",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700,flexShrink:0 }}>4</span>
                        <span>Si tu veux modifier quelque chose, dis-le directement à Claude dans le même chat</span>
                      </div>
                    </div>
                  </div>

                  {/* Prompt display */}
                  <div style={cardStyle}>
                    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10 }}>
                      <label style={{ ...labelStyle,marginBottom:0 }}>📝 Prompt généré ({generatedHTML.split("\n").length} lignes)</label>
                      <button onClick={() => { navigator.clipboard.writeText(generatedHTML).catch(()=>{}); setGenProgress("✅ Copié !"); }} style={{ ...btnSec,padding:"5px 12px",fontSize:10 }}>📋 Copier</button>
                    </div>
                    <pre style={{
                      background:"rgba(0,0,0,0.4)",border:`1px solid ${border}`,borderRadius:8,padding:16,
                      fontSize:11,lineHeight:1.5,color:"rgba(255,255,255,0.6)",maxHeight:500,overflowY:"auto",
                      whiteSpace:"pre-wrap",wordBreak:"break-word",fontFamily:"'Courier New',monospace",
                    }}>
                      {generatedHTML}
                    </pre>
                  </div>
                </>
              )}

              {/* Initial state */}
              {!generating && !generatedHTML && !genError && (
                <div style={{ ...cardStyle,textAlign:"center",padding:40 }}>
                  <div style={{ fontSize:40,marginBottom:10 }}>🚀</div>
                  <div style={{ fontSize:15,fontWeight:600,color:"rgba(255,255,255,0.6)",marginBottom:6 }}>Prêt à générer</div>
                  <div style={{ fontSize:12,color:"rgba(255,255,255,0.3)",marginBottom:20 }}>Configure tout puis clique sur le bouton</div>
                  <button onClick={handleGenerate} style={btnPrimary}>🚀 Générer le prompt</button>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
